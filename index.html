<!DOCTYPE html>
<!--[if lt IE 7 ]> <html lang="zh-CN" class="ie6"> <![endif]-->
<!--[if IE 7 ]>    <html lang="zh-CN" class="ie7"> <![endif]-->
<!--[if IE 8 ]>    <html lang="zh-CN" class="ie8"> <![endif]-->
<!--[if IE 9 ]>    <html lang="zh-CN" class="ie9"> <![endif]-->
<!--[if !IE]><!-->
<html lang="zh-CN"> <!--<![endif]-->

<head>
	<title>岁月留痕 - 翻页杂志展示</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0" />
	<link rel="icon" href="favicon.ico" type="image/jpeg" />
	<link rel="stylesheet" href="css/magazine.css" type="text/css" />

	<script type="text/javascript" src="extras/jquery.min.1.7.js"></script>
	<script type="text/javascript" src="extras/modernizr.2.5.3.min.js"></script>
	<script type="text/javascript" src="lib/hash.js"></script>
	<script type="text/javascript" src="js/pdf.min.js"></script>

	<audio id="background-music" loop>
		<source src="extras/Wild - All My Life_min.mp3" type="audio/mpeg">
		您的浏览器不支持音频元素。
	</audio>

	<style type="text/css">
		@font-face {
			font-family: 'Dutch 801 Roman';
			src: url('extras/Dutch 801 Roman BT.ttf') format('truetype');
			font-weight: normal;
			font-style: normal;
			font-display: swap;
		}

		@font-face {
			font-family: 'LXGW WenKai';
			src: url('extras/LXGWWenKaiLite-Medium.woff2') format('woff2'),
				 url('extras/LXGWWenKaiLite-Medium.ttf') format('truetype');
			font-weight: normal;
			font-style: normal;
			font-display: swap;
		}

		body {
			overflow: hidden;
			background-color: #f5f0e6;
			margin: 0;
			padding: 0;
			font-family: 'Dutch 801 Roman', 'LXGW WenKai', 'Georgia', serif;
		}
	</style>

</head>

<body>
	<div id="cover-page">
		<div class="cover-content">
			<h1>岁月留痕</h1>
			<p>点击下方按钮开始阅读</p>
			<div class="loading" id="loading">正在加载杂志...</div>
			<div class="progress-container">
				<div class="progress-bar">
					<div class="progress-fill"></div>
				</div>
				<div class="progress-text">0%</div>
			</div>
			<button id="open-book">翻开</button>
		</div>
	</div>

	<div class="custom-alert-overlay" id="custom-alert-overlay">
		<div class="custom-alert">
			<div class="custom-alert-icon">⏳</div>
			<div class="custom-alert-message" id="alert-message">正在加载杂志，请稍候...</div>
			<button class="custom-alert-button" id="alert-button">确定</button>
		</div>
	</div>

	<div id="canvas">
		<div class="zoom-icon zoom-icon-in"></div>
		<div class="music-control" id="music-control">
			<span class="music-icon music-play"></span>
		</div>
		<div class="zoom-controls" id="zoom-controls" style="display: none;">
			<div class="zoom-label">缩放</div>
			<input type="range" id="zoom-slider" min="1.5" step="0.1" value="1.5">
			<div class="zoom-value" id="zoom-value">100%</div>
		</div>

		<div class="magazine-viewport">
			<div class="container">
				<div class="magazine">
					<div ignore="1" class="next-button"></div>
					<div ignore="1" class="previous-button"></div>
				</div>
			</div>
		</div>

		<div class="thumbnails">
			<div>
				<ul>
				</ul>
			</div>
		</div>
	</div>

	<script type="text/javascript" src="js/magazine.js"></script>
	<script type="text/javascript">
		var pdfDocument = null;
		var totalPages = 0;
		var isBookOpen = false;
		var isMobile = false;

		function checkMobile() {
			isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
				(window.innerWidth <= 768);
			return isMobile;
		}

		function preloadPDF(callback) {
			initPDF('pages/magazine.pdf', function (pdf, error) {
				if (error) {
					console.error('PDF加载失败:', error);
					showAlert('PDF加载失败，请检查文件路径');
					return;
				}
				pdfDocument = pdf;
				totalPages = pdf.numPages;
				if (callback) callback();
			});
		}

		function loadApp() {
			checkMobile();
			$('#canvas').fadeIn(1000);
			var flipbook = $('.magazine');

			if (flipbook.width() == 0 || flipbook.height() == 0) {
				setTimeout(loadApp, 10);
				return;
			}

			var magazineWidth = isMobile ? 461 : 922;
			var magazineHeight = isMobile ? 600 : 600;

			flipbook.turn({
				width: magazineWidth,
				height: magazineHeight,
				duration: 1000,
				acceleration: !isChrome(),
				gradients: true,
				autoCenter: true,
				elevation: 50,
				pages: totalPages,
				display: isMobile ? 'single' : 'double',
				when: {
					turning: function (event, page, view) {
						var book = $(this),
							currentPage = book.turn('page'),
							pages = book.turn('pages');

						Hash.go('page/' + page).update();
						disableControls(page);

						$('.thumbnails .page-' + currentPage).parent().removeClass('current');
						$('.thumbnails .page-' + page).parent().addClass('current');

						setTimeout(function () {
							var currentThumb = $('.thumbnails .current');
							if (currentThumb.length > 0) {
								var container = $('.thumbnails > div');
								var containerRect = container[0].getBoundingClientRect();
								var thumbRect = currentThumb[0].getBoundingClientRect();

								var containerCenter = containerRect.left + containerRect.width / 2;
								var thumbCenter = thumbRect.left + thumbRect.width / 2;
								var offset = thumbCenter - containerCenter;

								var currentScrollLeft = container.scrollLeft();
								var newScrollLeft = currentScrollLeft + offset;

								newScrollLeft = Math.max(0, newScrollLeft);
								var maxScrollLeft = container[0].scrollWidth - containerRect.width;
								newScrollLeft = Math.min(newScrollLeft, maxScrollLeft);

								container.animate({ scrollLeft: newScrollLeft }, 500);
							}
						}, 100);
					},
					turned: function (event, page, view) {
						disableControls(page);
						$(this).turn('center');

						if (page == 1) {
							$(this).turn('peel', 'br');
						}
					},
					missing: function (event, pages) {
						for (var i = 0; i < pages.length; i++)
							addPage(pages[i], $(this));
					}
				}
			});

			$('.magazine-viewport').zoom({
				flipbook: $('.magazine'),
				max: 2.4,
				when: {
					swipeLeft: function () {
						$(this).zoom('flipbook').turn('next');
					},
					swipeRight: function () {
						$(this).zoom('flipbook').turn('previous');
					},
					resize: function (event, scale, page, pageElement) {
						if (scale == 1)
							loadSmallPage(page, pageElement);
						else
							loadLargePage(page, pageElement);
					},
					zoomIn: function () {
						$('.thumbnails').hide();
						$('.made').hide();
						$('.magazine').removeClass('animated').addClass('zoom-in');
						$('.zoom-icon').removeClass('zoom-icon-in').addClass('zoom-icon-out');
						$('.zoom-controls').show();

						if (!window.escTip && !$.isTouch) {
							escTip = true;
							$('<div />', { 'class': 'exit-message' }).
								html('<div>按ESC键退出</div>').
								appendTo($('body')).
								delay(2000).
								animate({ opacity: 0 }, 500, function () {
									$(this).remove();
								});
						}
					},
					zoomOut: function () {
						$('.exit-message').hide();
						$('.thumbnails').fadeIn();
						$('.made').fadeIn();
						$('.zoom-icon').removeClass('zoom-icon-out').addClass('zoom-icon-in');
						$('.zoom-controls').hide();

						setTimeout(function () {
							$('.magazine').addClass('animated').removeClass('zoom-in');
							resizeViewport();
						}, 0);
					}
				}
			});

			$('.magazine').bind('zooming', function (event, scale) {
				updateZoomSlider(scale);
			});

			if ($.isTouch)
				$('.magazine-viewport').bind('zoom.doubleTap', zoomTo);
			else
				$('.magazine-viewport').bind('zoom.tap', zoomTo);

			$(document).keydown(function (e) {
				var previous = 37, next = 39, esc = 27;

				switch (e.keyCode) {
					case previous:
						$('.magazine').turn('previous');
						e.preventDefault();
						break;
					case next:
						$('.magazine').turn('next');
						e.preventDefault();
						break;
					case esc:
						$('.magazine-viewport').zoom('zoomOut');
						e.preventDefault();
						break;
				}
			});

			Hash.on('^page\/([0-9]*)$', {
				yep: function (path, parts) {
					var page = parts[1];
					if (page !== undefined) {
						if ($('.magazine').turn('is'))
							$('.magazine').turn('page', page);
					}
				},
				nop: function (path) {
					if ($('.magazine').turn('is'))
						$('.magazine').turn('page', 1);
				}
			});

			$(window).resize(function () {
				resizeViewport();
			}).bind('orientationchange', function () {
				resizeViewport();
			});

			$('.thumbnails').click(function (event) {
				var page;
				if (event.target && (page = /page-([0-9]+)/.exec($(event.target).attr('class')))) {
					$('.magazine').turn('page', page[1]);
				}
			});

			$('.thumbnails li').
				bind($.mouseEvents.over, function (e) {
					var rect = this.getBoundingClientRect();
					var x = ((e.clientX - rect.left) / rect.width) * 100;
					var y = ((e.clientY - rect.top) / rect.height) * 100;
					$(this).css('transform-origin', x + '% ' + y + '%');
					$(this).addClass('thumb-hover');
				}).bind($.mouseEvents.out, function () {
					$(this).css('transform-origin', '50% 50%');
					$(this).removeClass('thumb-hover');
				});

			if ($.isTouch) {
				$('.thumbnails').addClass('thumbanils-touch').bind($.mouseEvents.move, function (event) {
					event.preventDefault();
				});
			} else {
				$('.thumbnails ul').mouseover(function () {
					$('.thumbnails').addClass('thumbnails-hover');
				}).mousedown(function () {
					return false;
				}).mouseout(function () {
					$('.thumbnails').removeClass('thumbnails-hover');
				});

				$('.thumbnails').bind('mousewheel DOMMouseScroll', function (e) {
					var scrollDirection = e.originalEvent.wheelDelta || -e.originalEvent.detail;
					var scrollDistance = scrollDirection > 0 ? -120 : 120;
					var $container = $(this).find('div');
					var currentScroll = $container.scrollLeft();
					$container.scrollLeft(currentScroll + scrollDistance);
					e.preventDefault();
				});

				var touchStartX = 0;
				var touchStartScroll = 0;
				$('.thumbnails').bind('touchstart', function (e) {
					touchStartX = e.originalEvent.touches[0].clientX;
					touchStartScroll = $(this).find('div').scrollLeft();
				}).bind('touchmove', function (e) {
					var touchCurrentX = e.originalEvent.touches[0].clientX;
					var deltaX = touchStartX - touchCurrentX;
					$(this).find('div').scrollLeft(touchStartScroll + deltaX);
				});
			}

			if ($.isTouch) {
				$('.magazine').bind('touchstart', regionClick);
			} else {
				$('.magazine').click(regionClick);
			}

			$('.next-button').bind($.mouseEvents.over, function () {
				$(this).addClass('next-button-hover');
			}).bind($.mouseEvents.out, function () {
				$(this).removeClass('next-button-hover');
			}).bind($.mouseEvents.down, function () {
				$(this).addClass('next-button-down');
			}).bind($.mouseEvents.up, function () {
				$(this).removeClass('next-button-down');
			}).click(function () {
				$('.magazine').turn('next');
			});

			$('.previous-button').bind($.mouseEvents.over, function () {
				$(this).addClass('previous-button-hover');
			}).bind($.mouseEvents.out, function () {
				$(this).removeClass('previous-button-hover');
			}).bind($.mouseEvents.down, function () {
				$(this).addClass('previous-button-down');
			}).bind($.mouseEvents.up, function () {
				$(this).removeClass('previous-button-down');
			}).click(function () {
				$('.magazine').turn('previous');
			});

			resizeViewport();
			$('.magazine').addClass('animated');

			var maxZoom = largeMagazineWidth() / $('.magazine').width();
			$('#zoom-slider').attr('max', maxZoom.toFixed(1));
		}

		$('.zoom-icon').bind('mouseover', function () {
			if ($(this).hasClass('zoom-icon-in'))
				$(this).addClass('zoom-icon-in-hover');
			if ($(this).hasClass('zoom-icon-out'))
				$(this).addClass('zoom-icon-out-hover');
		}).bind('mouseout', function () {
			if ($(this).hasClass('zoom-icon-in'))
				$(this).removeClass('zoom-icon-in-hover');
			if ($(this).hasClass('zoom-icon-out'))
				$(this).removeClass('zoom-icon-out-hover');
		}).bind('click', function () {
			if ($(this).hasClass('zoom-icon-in'))
				$('.magazine-viewport').zoom('zoomIn');
			else if ($(this).hasClass('zoom-icon-out'))
				$('.magazine-viewport').zoom('zoomOut');
		});

		var zoomSlider = $('#zoom-slider');
		var zoomValue = $('#zoom-value');

		zoomSlider.on('input change', function () {
			var scale = parseFloat($(this).val());
			$('.magazine').turn('zoom', scale);
			$('.magazine-viewport').zoom('resize');
			zoomValue.text(Math.round(scale * 100) + '%');
		});

		function updateZoomSlider(scale) {
			zoomSlider.val(scale);
			zoomValue.text(Math.round(scale * 100) + '%');
		}

		var music = document.getElementById('background-music');
		var musicControl = $('#music-control');
		var musicIcon = musicControl.find('.music-icon');

		musicIcon.addClass('music-pause').removeClass('music-play');

		musicControl.click(function () {
			if (music.paused) {
				music.play();
				musicIcon.addClass('music-play').removeClass('music-pause');
			} else {
				music.pause();
				musicIcon.addClass('music-pause').removeClass('music-play');
			}
		});

		var coverPage = $('#cover-page');
		var canvas = $('#canvas');
		var openBookBtn = $('#open-book');
		var loading = $('#loading');
		var isPDFLoading = false;
		var isPDFLoaded = false;
		var alertOverlay = $('#custom-alert-overlay');
		var alertMessage = $('#alert-message');
		var alertButton = $('#alert-button');

		function showAlert(message) {
			alertMessage.text(message);
			alertOverlay.addClass('show');
		}

		function hideAlert() {
			alertOverlay.removeClass('show');
		}

		alertButton.click(hideAlert);

		canvas.hide();
		checkMobile();

		function startPDFLoading() {
			if (isPDFLoading || isPDFLoaded) return;
			
			isPDFLoading = true;
			setLoadingProgress(5, '正在加载PDF...');
			
			preloadPDF(function(pdf, error) {
				isPDFLoading = false;
				
				if (error) {
					setLoadingProgress(0, 'PDF加载失败，请刷新重试');
					return;
				}
				
				setLoadingProgress(10, '正在生成缩略图...');
				
				generateAllThumbnails(function() {
					setLoadingProgress(100, '加载完成');
					setMobileMode(isMobile);
					buildThumbnails();
					setTimeout(function() {
						isPDFLoaded = true;
						loading.hide();
						$('.progress-container').hide();
						openBookBtn.removeAttr('disabled');
					}, 300);
				});
			});
		}

		function loadSecondaryResources() {
			var woff2Font = new FontFace('LXGW WenKai', 'url(extras/LXGWWenKaiLite-Medium.woff2) format("woff2")');
			woff2Font.load().then(function(loadedFont) {
				document.fonts.add(loadedFont);
			}).catch(function(error) {
				console.warn('WOFF2字体加载失败:', error);
			});
			
			startPDFLoading();
		}

		function loadPrimaryFont() {
			setLoadingProgress(0, '正在加载字体...');
			
			if ('fonts' in document) {
				var primaryFont = new FontFace('Dutch 801 Roman', 'url(extras/Dutch 801 Roman BT.ttf) format("truetype")');
				primaryFont.load().then(function(loadedFont) {
					document.fonts.add(loadedFont);
					loadSecondaryResources();
				}).catch(function(error) {
					console.warn('主字体加载失败，继续加载其他资源:', error);
					loadSecondaryResources();
				});
			} else {
				setTimeout(loadSecondaryResources, 100);
			}
		}

		document.addEventListener('DOMContentLoaded', function () {
			setTimeout(loadPrimaryFont, 50);
		});

		window.addEventListener('load', function() {
			if (!isPDFLoading && !isPDFLoaded) {
				startPDFLoading();
			}
		});

		openBookBtn.click(function () {			
			if (isBookOpen) return;

			if (!isPDFLoaded) {
				showAlert('正在加载杂志，请稍候...');
				return;
			}

			coverPage.addClass('hidden');
			canvas.show().addClass('visible');
			music.play();
			musicIcon.addClass('music-play').removeClass('music-pause');
			loadApp();
			isBookOpen = true;
		});

		yepnope({
			test: Modernizr.csstransforms,
			yep: ['lib/turn.js'],
			nope: ['lib/turn.html4.min.js'],
			both: ['lib/zoom.js'],
			complete: function () {
			}
		});
	</script>

</body>

</html>
